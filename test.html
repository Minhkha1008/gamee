<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Sky Quiz Defender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .test-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Page</h1>
        <div id="test-results"></div>
        <button onclick="testGameFiles()">Test Game Files</button>
        <button onclick="window.location.href='index.html'">Open Game</button>
    </div>

    <script>
        function testGameFiles() {
            const results = document.getElementById('test-results');
            results.innerHTML = '';
            
            const tests = [
                { name: 'HTML File', path: 'index.html' },
                { name: 'CSS Style', path: 'css/style.css' },
                { name: 'CSS Animation', path: 'css/animation.css' },
                { name: 'JS Questions', path: 'js/questions.js' },
                { name: 'JS Sound', path: 'js/sound.js' },
                { name: 'JS Settings', path: 'js/settings.js' },
                { name: 'JS Highscore', path: 'js/highscore.js' },
                { name: 'JS Achievements', path: 'js/achievements.js' },
                { name: 'JS Powerups', path: 'js/powerups.js' },
                { name: 'JS Player', path: 'js/player.js' },
                { name: 'JS Enemy', path: 'js/enemy.js' },
                { name: 'JS Bullet', path: 'js/bullet.js' },
                { name: 'JS Collision', path: 'js/collision.js' },
                { name: 'JS Quiz', path: 'js/quiz.js' },
                { name: 'JS Level', path: 'js/level.js' },
                { name: 'JS UI', path: 'js/ui.js' },
                { name: 'JS Game', path: 'js/game.js' },
                { name: 'Questions Data', path: 'assets/data/questions.json' }
            ];

            tests.forEach(test => {
                const div = document.createElement('div');
                div.className = 'status';
                
                fetch(test.path)
                    .then(response => {
                        if (response.ok) {
                            div.className = 'status success';
                            div.textContent = `✅ ${test.name}: OK`;
                        } else {
                            div.className = 'status error';
                            div.textContent = `❌ ${test.name}: Error ${response.status}`;
                        }
                    })
                    .catch(error => {
                        div.className = 'status error';
                        div.textContent = `❌ ${test.name}: ${error.message}`;
                    });
                
                results.appendChild(div);
            });
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            console.log('Test page loaded successfully');
            document.getElementById('test-results').innerHTML = '<p style="color: green;">✅ Test page loaded! Click "Test Game Files" to check all files.</p>';
        });
    </script>
</body>
</html>
